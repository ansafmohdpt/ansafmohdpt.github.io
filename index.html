<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansaf Muhammed P T | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 4rem 2rem;
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 2rem;
        }

        .status {
            display: inline-block;
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2rem;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .btn {
            display: inline-block;
            background: #0077b5; /* LinkedIn Color */
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
        }

        .btn:hover {
            background: #006097;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 119, 181, 0.4);
        }

        .vibecoding-label {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #64748b;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .vibecoding-label span {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ansaf Muhammed P T</h1>
        <div class="status">🚧 Portfolio Under Construction 🚧</div>
        <p>I'm currently working on building my new portfolio site. Please check back later!</p>
        <a href="https://www.linkedin.com/in/ansafmohdpt/" target="_blank" class="btn">Connect on LinkedIn</a>
        <div class="vibecoding-label">Completely created with <span>vibecoding</span></div>
    </div>
</body>
</html>
